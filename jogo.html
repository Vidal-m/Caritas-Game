<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caritas Game - Tabuleiro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 100%; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fff; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }

        /* Contador de Fases no Topo */
        .fase-header { margin-top: 10px; margin-bottom: 20px; }
        .fase-badge { 
            background: #f4ebe6; 
            border: 3px solid #1a1a1a; 
            border-radius: 12px; 
            padding: 8px 30px; 
            font-weight: bold; 
            font-size: 1.2rem; 
        }

        /* Container de Jogadores Lado a Lado */
        .players-container { 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 30px; 
            width: 100%; 
            max-width: 1200px; 
            margin: auto 0;
            transition: all 0.4s ease-in-out; 
        }

        /* CARD RPG */
        .player-card { 
            position: relative;     
            width: 240px; 
            height: 350px;          
            border: 3px solid #1a1a1a; 
            border-radius: 32px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0.5; 
            transform: scale(0.9);
            overflow: hidden;       
        }

        .player-card.active { 
            opacity: 1; 
            transform: scale(1.1); 
            border-width: 4px; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.25); 
        }

        .player-card.dead {
            opacity: 0.15 !important;
            transform: scale(0.8) !important;
        }

        .player-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            z-index: 1;             
        }

        .player-info-block {
            position: relative;
            z-index: 2;             
            width: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 45%, rgba(0, 0, 0, 0.6) 75%, transparent 100%);
            padding: 25px 15px 15px 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .player-name { 
            font-weight: bold; 
            margin-bottom: 12px; 
            font-size: 1.2rem; 
            color: #fff;            
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        .player-bars { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .bar-container { display: flex; flex-direction: column; gap: 3px; }
        .bar-label { font-size: 0.75rem; font-weight: bold; color: #e5e7eb; } 
        
        .bar-bg { 
            width: 100%; 
            height: 12px; 
            background: rgba(255, 255, 255, 0.2); 
            border: 1.5px solid #000; 
            border-radius: 6px; 
            overflow: hidden; 
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.5s ease-in-out, background-color 0.5s ease; }
        
        .fill-temporal { background: #B0C1D9; }
        .fill-material { background: #A09F87; }
        .fill-moral { background: #A66249; }

        /* Caixa de Pergunta Inferior */
        .pergunta-container { 
            margin-top: auto; 
            margin-bottom: 40px; 
            width: 80%; 
            max-width: 850px; 
            background: #f4ebe6; 
            border: 4px solid #1a1a1a; 
            border-radius: 20px; 
            padding: 25px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.4s ease;
        }
        .pergunta-text { 
            font-size: 1.35rem; 
            font-weight: bold; 
            color: #1a1a1a; 
            line-height: 1.5; 
            white-space: normal;       
            word-break: break-word;    
        }

        .pergunta-container.no-topo { margin-top: 10px; margin-bottom: 20px; }

        /* Grelha de Alternativas (2x2) */
        .options-container { width: 80%; max-width: 850px; margin-top: 10px; margin-bottom: auto; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .option-btn { 
            background: #f4ebe6; 
            border: 3px solid #1a1a1a; 
            border-radius: 16px; 
            padding: 22px; 
            font-size: 1.15rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: left;
            line-height: 1.4;
            transition: transform 0.2s, background-color 0.2s; 
        }
        .option-btn:hover { background: #fef08a; transform: translateY(-3px); }

        /* Utilitários */
        .hidden { display: none !important; }

        /* Modal Fim de Jogo */
        .modal-end { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10; 
            align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; 
        }
        .modal-content { 
            background: #1a1a1a; border: 3px solid #fff; padding: 30px; border-radius: 32px; 
            max-width: 480px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .modal-content h2 { font-size: 1.8rem; }
        .modal-img { width: 100%; max-height: 260px; object-fit: cover; object-position: top center; border-radius: 20px; border: 2px solid #fff; }
        .modal-content p { font-size: 1.05rem; line-height: 1.5; color: #d1d5db; padding: 0 10px; }
        .modal-content button { background: #fff; color: #1a1a1a; border: none; padding: 14px 40px; font-weight: bold; font-size: 1rem; border-radius: 16px; cursor: pointer; width: 100%; }
        .modal-content button:hover { background: #fef08a; }


        /* 👑 REFORMULAÇÃO ABSOLUTA DA INTRODUÇÃO DA CARIDADE (Estilo Anexo 2 e 3) */
        .intro-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 30; 
        }

        /* 📦 CAIXA DE TEXTO: Centralizada na lateral esquerda */
        .intro-dialog-box {
            position: absolute;
            left: 8%;
            bottom: 12%;
            background: #f4ebe6;
            border: 4px solid #1a1a1a;
            border-radius: 24px;
            width: 55%;               /* Ocupa pouco mais da metade da tela para dar espaço ao avatar */
            padding: 30px 45px 30px 30px; 
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            min-height: 160px;
            display: flex;
            align-items: center;
        }

        .intro-text-side {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .intro-speaker-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #A66249; 
        }

        .intro-text-box {
            font-size: 1.25rem;
            font-weight: bold;
            color: #1a1a1a;
            line-height: 1.5;
            white-space: normal;       
            word-break: break-word;   
        }

        /* 🌟 AVATAR DA CARIDADE: Isolado e flutuante no canto inferior direito */
        .intro-avatar-isolated {
            position: relative;
            right: -60%;
            bottom: -40%;
            width: 40%;            /* Tamanho imponente e bem destacado */
            height: 60%;

            overflow: hidden;

        }

        .intro-avatar-isolated img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        /* Indicador de clique fixado elegantemente no canto da própria caixa */
        .intro-arrow {
            position: absolute;
            bottom: 15px; 
            right: 20px; 
            font-size: 1.1rem;
            animation: bounce 0.8s infinite alternate;
            color: #1a1a1a;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="intro-overlay hidden" id="overlay-intro-caridade">
        
        <div class="intro-dialog-box" id="caixa-intro-caridade">
            <div class="intro-text-side">
                <div class="intro-speaker-name">Caridade</div>
                <p class="intro-text-box" id="texto-intro-caridade"></p>
            </div>
            <div class="intro-arrow">▶</div>
        </div>

        <div class="intro-avatar-isolated">
            <img src="assets/game-master/game_master_sorriso_largo.png" alt="Caridade">
        </div>

    </div>

    <div class="fase-header">
        <div class="fase-badge" id="fase-contador">Fase 1</div>
    </div>

    <div class="players-container" id="painel-jogadores"></div>

    <div class="pergunta-container" id="caixa-pergunta">
        <p class="pergunta-text" id="texto-pergunta">A carregar pergunta...</p>
    </div>

    <div class="options-container hidden" id="painel-opcoes">
        <div class="options-grid" id="grid-alternativas">
            <button class="option-btn" data-idx="0"></button>
            <button class="option-btn" data-idx="1"></button>
            <button class="option-btn" data-idx="2"></button>
            <button class="option-btn" data-idx="3"></button>
        </div>
    </div>

    <div class="modal-end" id="end-screen">
        <div class="modal-content">
            <h2 id="end-title">Transição Concluída</h2>
            <img id="end-avatar" class="modal-img" src="" alt="Desfecho">
            <p id="end-desc"></p>
            <button id="btn-modal-action">Continuar</button>
        </div>
    </div>

    <script src="jogo.js"></script>
</body>
</html>
