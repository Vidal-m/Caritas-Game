<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caritas Game - Tabuleiro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 100%; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #fff; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }

        /* Contador de Fases no Topo */
        .fase-header { margin-top: 10px; margin-bottom: 20px; }
        .fase-badge { 
            background: #f4ebe6; 
            border: 3px solid #1a1a1a; 
            border-radius: 12px; 
            padding: 8px 30px; 
            font-weight: bold; 
            font-size: 1.2rem; 
        }

        /* Container de Jogadores Lado a Lado */
        .players-container { 
            display: flex; 
            justify-content: center; 
            align-items: flex-end; 
            gap: 30px; 
            width: 100%; 
            max-width: 1200px; 
            margin: auto 0;
            transition: all 0.4s ease-in-out; 
        }

        /* 👑 CARD RPG: Atua como container relativo com altura fixa */
        .player-card { 
            position: relative;     /* Permite sobrepor os status por cima da foto */
            width: 240px; 
            height: 350px;          /* Altura para a imagem de fundo ficar imponente */
            border: 3px solid #1a1a1a; 
            border-radius: 32px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; /* Empurra os textos e barras para a base do card */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0.5; 
            transform: scale(0.9);
            overflow: hidden;       /* Corta a imagem nas bordas arredondadas de 32px */
        }

        /* Destaque do Turno Ativo */
        .player-card.active { 
            opacity: 1; 
            transform: scale(1.1); 
            border-width: 4px; 
            box-shadow: 0 12px 25px rgba(0,0,0,0.25); 
        }

        /* Jogador Eliminado/Desencarnado */
        .player-card.dead {
            opacity: 0.15 !important;
            transform: scale(0.8) !important;
        }

        /* 📷 FOTO DE FUNDO ABSOLUTA: Preenche 100% do cartão por trás */
        .player-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            z-index: 1;             /* Camada inferior */
        }

        /* 📊 BLOCO DE STATUS: Sobreposto à foto com degradê escuro para leitura */
        .player-info-block {
            position: relative;
            z-index: 2;             /* Camada superior (flutua sobre a imagem) */
            width: 100%;
            /* O degradê começa transparente no topo e fica escuro na base onde estão as letras */
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 45%, rgba(0, 0, 0, 0.6) 75%, transparent 100%);
            padding: 25px 15px 15px 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Ajuste dos textos para contrastar perfeitamente no fundo escuro */
        .player-name { 
            font-weight: bold; 
            margin-bottom: 12px; 
            font-size: 1.2rem; 
            color: #fff;            /* Texto branco */
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* Barras de Status Individuais */
        .player-bars { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .bar-container { display: flex; flex-direction: column; gap: 3px; }
        .bar-label { font-size: 0.75rem; font-weight: bold; color: #e5e7eb; } /* Cinza claro */
        
        .bar-bg { 
            width: 100%; 
            height: 12px; 
            background: rgba(255, 255, 255, 0.2); 
            border: 1.5px solid #000; 
            border-radius: 6px; 
            overflow: hidden; 
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.5s ease-in-out, background-color 0.5s ease; }
        
        .fill-temporal { background: #3b82f6; }
        .fill-material { background: #10b981; }
        .fill-moral { background: #ec4899; }

        /* Caixa de Pergunta Inferior (Fase de Destaque) */
        .pergunta-container { 
            margin-top: auto; 
            margin-bottom: 40px; 
            width: 80%; 
            max-width: 850px; 
            background: #f4ebe6; 
            border: 4px solid #1a1a1a; 
            border-radius: 20px; 
            padding: 25px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.4s ease;
        }
        .pergunta-text { 
            font-size: 1.35rem; 
            font-weight: bold; 
            color: #1a1a1a; 
            line-height: 1.5; 
            white-space: normal;       
            word-break: break-word;    
        }

        /* Transição da Pergunta para o Topo (Fase de Resposta) */
        .pergunta-container.no-topo { margin-top: 10px; margin-bottom: 20px; }

        /* Grelha de Alternativas (2x2) */
        .options-container { width: 80%; max-width: 850px; margin-top: 10px; margin-bottom: auto; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .option-btn { 
            background: #f4ebe6; 
            border: 3px solid #1a1a1a; 
            border-radius: 16px; 
            padding: 22px; 
            font-size: 1.15rem; 
            font-weight: bold; 
            cursor: pointer; 
            text-align: left;
            line-height: 1.4;
            transition: transform 0.2s, background-color 0.2s; 
        }
        .option-btn:hover { background: #fef08a; transform: translateY(-3px); }

        /* Utilitários */
        .hidden { display: none !important; }

        /* Modal Fim de Jogo */
        .modal-end { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10; align-items: center; justify-content: center; color: #fff; text-align: center; padding: 20px; }
        .modal-content { background: #1a1a1a; border: 3px solid #fff; padding: 40px; border-radius: 24px; max-width: 550px; width: 100%; }
        .modal-content h2 { font-size: 2rem; margin-bottom: 15px; }
        .modal-content p { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; color: #d1d5db; }
        .modal-content button { background: #fff; color: #1a1a1a; border: none; padding: 12px 30px; font-weight: bold; font-size: 1rem; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
        .modal-content button:hover { background: #e5e7eb; }
    </style>
</head>
<body>

    <div class="fase-header">
        <div class="fase-badge" id="fase-contador">Fase 1</div>
    </div>

    <div class="players-container" id="painel-jogadores"></div>

    <div class="pergunta-container" id="caixa-pergunta">
        <p class="pergunta-text" id="texto-pergunta">A carregar pergunta...</p>
    </div>

    <div class="options-container hidden" id="painel-opcoes">
        <div class="options-grid" id="grid-alternativas">
            <button class="option-btn" data-idx="0"></button>
            <button class="option-btn" data-idx="1"></button>
            <button class="option-btn" data-idx="2"></button>
            <button class="option-btn" data-idx="3"></button>
        </div>
    </div>

    <div class="modal-end" id="end-screen">
        <div class="modal-content">
            <h2 id="end-title">Transição Concluída</h2>
            <p id="end-desc"></p>
            <button id="btn-modal-action">Continuar</button>
        </div>
    </div>

    <script src="jogo.js"></script>
</body>
</html>
