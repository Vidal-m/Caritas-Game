<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caritas Game - Introdução</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #fff; overflow: hidden; }
        
        .container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 40px; }
        
        /* Botão Skip no canto superior direito */
        .btn-skip { position: absolute; top: 30px; right: 40px; padding: 10px 25px; font-weight: bold; font-size: 1rem; border: 2px solid #1a1a1a; background: #fff; border-radius: 12px; cursor: pointer; }
        
        /* Ilustração da Caridade (Alinhada à direita e acima da caixa de diálogo) */
        .gm-avatar { position: relative; right: -10%; bottom: 0px; height: 350px; z-index: 2; }
        .P1-avatar { position: relative; right: 0%; bottom: 0px; height: 200px; z-index: 2; }

        
        /* Elementos gráficos das barras de status no canto superior esquerdo (surgem no slide 2) */
        .status-preview { position: absolute; top: 40px; left: 50px; display: none; flex-direction: column; gap: 8px; }
        /* .preview-circle { width: 45px; height: 45px; background: #e5e7eb; border-radius: 50%; border: 2px solid #1a1a1a; margin-bottom: 5px; } */
        .preview-bar { height: 8px; border-radius: 4px; }
        .bar-blue { width: 120px; background: #3b82f6; }
        .bar-pink { width: 120px; background: #ec4899; }
        .bar-green { width: 120px; background: #10b981; }

        .bar-blue.best { width: 10px; background: #a0c1f5; }
        .bar-pink.best { width: 10px; background: #f5b9d7; }
        .bar-green.best { width: 10px; background: #10b981; }

        .bar-blue.worst { width: 200px; background: #3b82f6; }
        .bar-pink.worst { width: 200px; background: #ec4899; }
        .bar-green.worst { width: 10px; background: #10b981; }

        /* Caixa de diálogo inferior idêntica ao teu wireframe */
        .dialog-box { position: relative; z-index: 2; width: 80%; max-width: 900px; min-height: 140px; background: #f4ebe6; border: 4px solid #1a1a1a; border-radius: 24px; padding: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .dialog-text { font-size: 1.3rem; font-weight: bold; color: #1a1a1a; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-skip" id="skip-trigger">SKIP</button>

        <div class="status-preview" id="status-demo">
            <!-- <div class="preview-circle"></div> -->
            <img src="assets/player1/player1-1material-1moral-3temporal.png" alt="Player1 img" class="P1-avatar">

            <div class="preview-bar bar-blue"></div>
            <div class="preview-bar bar-pink"></div>
            <div class="preview-bar bar-green"></div>
        </div>

        <img src="assets/game master intro.png" alt="Caridade GM" class="gm-avatar">

        <div class="dialog-box" id="dialog-trigger">
            <p class="dialog-text" id="bubble-content">Carregando introdução espiritual...</p>
        </div>
    </div>

    <script src="intro.js"></script>
</body>
</html>
