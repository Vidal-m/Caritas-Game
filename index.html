<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caritas Game - Splash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #000; }
        
        .container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Imagem de fundo começa invisível e ganha nitidez gradualmente */
        .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 4s ease-in-out; z-index: 1; padding: 20px; }
        
        /* Elementos da interface sobrepostos */
        .ui-layer { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 40px; text-align: center; }
        
        h1 { font-size: 3.5rem; color: #1a1a1a; font-weight: 800; text-shadow: 0 2px 4px rgba(255,255,255,0.8); opacity: 0; transition: opacity 2s ease-in-out; }
        
        /* Estilização básica do botão Play simulando o ícone central */
        .btn-play { background: #1a1a1a; border: none; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transform: scale(0.8); transition: opacity 1s ease, transform 1s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-play::after { content: ''; display: block; width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid #fff; margin-left: 6px; }
        .btn-play:hover { transform: scale(1.1); background: #333; }
        
        /* Classes utilitárias de gatilho visual via JS */
        .fade-in-bg { opacity: 0.85; }
        .fade-in-title { opacity: 1; }
        .show-btn { opacity: 1; transform: scale(1); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Substituir pelo caminho real da tua ilustração de Jesus e discípulos -->
        <img id="bg-art" src="jesus_and_co.png" alt="Jesus e Discípulos" class="bg-image">

        <div class="ui-layer">
            <h1 id="game-title">Caritas Game</h1>
            <button id="play-trigger" class="btn-play" aria-label="Jogar"></button>
        </div>
    </div>

    <script src="splash.js"></script>
</body>
</html>
